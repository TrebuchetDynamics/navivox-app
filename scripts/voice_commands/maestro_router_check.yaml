# Router enablement + model download smoke (Task 12). Run:
#   maestro test scripts/voice_commands/maestro_router_check.yaml
# Requires: a release build installed on an attached/connected device, and
# network access for the model download. This flow only verifies that the
# 'On-device voice commands (beta)' toggle and model download succeed; actual
# command routing (mic-driven) is verified manually per the plan's on-device
# smoke step, since Maestro cannot inject microphone audio.
appId: com.trebuchetdynamics.navivox
---
- launchApp:
    stopApp: true
- extendedWaitUntil:
    visible: "Settings\nTab 2 of 2"
    timeout: 60000
- tapOn: "Settings\nTab 2 of 2"
- scrollUntilVisible:
    element: "(?s).*On-device voice commands.*"
    direction: DOWN
    timeout: 30000
    speed: 70
- tapOn: "On-device voice commands"
- scrollUntilVisible:
    element: "(?s).*Download model.*"
    direction: DOWN
    timeout: 30000
    speed: 70
- tapOn: "Download"
- extendedWaitUntil:
    visible: "(?s).*Delete model.*"
    timeout: 240000
- takeScreenshot: router_check_enabled
