# Static validation: maestro check-syntax scripts/maestro/gateway_profiles_unsupported_qa.yaml
# Physical-device receipt for a saved gateway that does not advertise profile
# administration. This proves Wing fails closed instead of exposing dead CRUD.
# Replace with a CRUD flow when the gateway independently advertises profile
# read/write endpoints and scopes. Pass the saved label with
# `-e WING_QA_GATEWAY_LABEL="<saved gateway label>"`.
appId: com.trebuchetdynamics.hermes.wing
name: gateway_profiles_unsupported_qa
---
- launchApp:
    stopApp: true
- setOrientation: PORTRAIT
- runFlow:
    when:
      visible: "(?s).*All chats.*"
    commands:
      - tapOn: "(?s).*All chats.*"
- assertVisible: "(?s).*Default agent.*"
- assertVisible: "(?s).*Settings.*"
- tapOn: "(?s)^More.*"
- assertVisible: "(?s).*Agents.*"
- tapOn: "(?s)^Agents.*"
- assertVisible: "(?s).*Select gateway.*"
- tapOn: "(?s).*Select gateway.*"
- tapOn: "(?s).*${WING_QA_GATEWAY_LABEL}.*"
- extendedWaitUntil:
    visible: "(?s).*Agents unavailable.*"
    timeout: 60000
- assertVisible: "(?s).*Update Hermes Agent and reconnect this gateway with profile permissions.*"
- assertNotVisible: "(?s).*New Agent.*"
- takeScreenshot: gateway_profiles_fail_closed
