# Static validation: maestro check-syntax scripts/maestro/session_metadata_qa.yaml
# Physical-device receipt for bounded server-reported session metadata. Preserves
# secure app data and uses the real saved gateway selected by the contact.
appId: com.trebuchetdynamics.hermes.wing
name: session_metadata_qa
---
- launchApp:
    stopApp: true
- setOrientation: PORTRAIT
- runFlow:
    when:
      visible: "(?s).*All chats.*"
    commands:
      - tapOn: "(?s).*All chats.*"
- assertVisible: "(?s).*Default agent.*"
- tapOn: "(?s).*Default agent.*"
- extendedWaitUntil:
    visible: "(?s).*online.*"
    timeout: 60000
- tapOn: "(?s).*More actions.*"
- tapOn: "^Sessions$"
- extendedWaitUntil:
    visible: "(?s).*Hermes sessions.*"
    timeout: 30000
- assertNotVisible: "(?s).*No Hermes sessions yet.*"
- tapOn: "(?s).*Session actions.*"
- tapOn: "^View details$"
- assertVisible: "(?s).*Session details.*"
- assertVisible: "(?s).*Input tokens: [0-9]+.*"
- assertVisible: "(?s).*Output tokens: [0-9]+.*"
- assertVisible: "(?s).*API calls: [0-9]+.*"
- assertVisible: "(?s).*Started: 20[0-9]{2}-.*"
- assertNotVisible: "(?s).*Started: [0-9]{10}[.].*"
- assertNotVisible: "(?s).*Last active: [0-9]{10}[.].*"
- assertNotVisible: "(?s).*Preview:.*"
# Do not capture a screenshot: session identity/title are intentionally visible
# in this operator-only sheet and must not be copied into QA artifacts.
- tapOn: "^Copy details$"
- assertVisible: "(?s).*Copied redacted Hermes session details.*"
