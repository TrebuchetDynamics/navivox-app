# Static validation: maestro check-syntax scripts/maestro/chat_ux_qa.yaml
# Keep selectors and prompts synthetic. Screenshot output belongs only in the
# ignored test-results tree or an external temporary directory.
appId: com.trebuchetdynamics.hermes.wing
name: chat_ux_qa
---
- launchApp
- setOrientation: PORTRAIT
- runFlow:
    when:
      visible: "(?s).*All chats.*"
    commands:
      - tapOn: "(?s).*All chats.*"
- assertVisible: "(?s).*Default agent.*"
- assertVisible: "(?s).*Settings.*"
- tapOn: "(?s).*Default agent.*"
- assertVisible: "(?s).*online.*"
- assertVisible: "(?s).*Message Hermes….*"
- assertNotVisible: "(?s).*Settings.*"
- tapOn: "(?s).*More actions.*"
- tapOn: "(?s).*New session.*"
- extendedWaitUntil:
    visible: "(?s).*How can Hermes help today?.*"
    timeout: 30000
- takeScreenshot: 01_empty_chat

# Exercise functional client-owned slash discovery without sending it.
- tapOn: "(?s).*Message Hermes….*"
- inputText: "/s"
- assertVisible: "(?s).*Wing commands.*"
- assertVisible: "(?s)^/sessions.*"
- assertVisible: "(?s)^/settings.*"
- eraseText: 20

# Open the local help catalog; these commands must never reach Hermes Agent.
- inputText: "/help"
- tapOn: "(?s).*Send.*"
- assertVisible: "(?s).*These commands run on this device and are never sent to Hermes Agent.*"
- assertVisible: "(?s)^/new.*"
- hideKeyboard
- pressKey: back

# Exercise multiline draft layout without mutating the conversation. The empty
# unfocused Telegram-style composer intentionally hides its text hint, so focus
# its central draft area by position before addressing the text field.
- tapOn:
    point: "50%,90%"
- inputText: "This is a deliberately long mobile draft that verifies wrapping and keeps every composer action reachable"
- assertVisible: "(?s).*deliberately long mobile draft.*"
- takeScreenshot: 02_multiline_draft_keyboard
- eraseText: 200

# Exercise the real gateway turn lifecycle and render the response.
- inputText: "What color is fresh snow Reply with one lowercase word"
- tapOn: "(?s).*Send.*"
- assertVisible: "(?s).*What color is fresh snow.*"
- extendedWaitUntil:
    visible: "(?s)^white.*"
    timeout: 120000
- assertVisible: "(?s).*Token usage:.*total.*"
- hideKeyboard
- takeScreenshot: 03_live_response
- runFlow:
    when:
      visible: "(?s).*Settings.*"
    commands:
      - tapOn: "(?s).*Default agent.*"
      - assertVisible: "(?s).*Message Hermes….*"

# Exercise explicit transcript export without exposing clipboard contents.
- tapOn: "(?s).*More actions.*"
- assertVisible: "(?s).*Copy transcript.*"
- tapOn: "(?s).*Copy transcript.*"
- assertVisible: "(?s).*Copy as text.*"
- assertVisible: "(?s).*Copy as Markdown.*"
- tapOn: "(?s).*Copy as Markdown.*"
- assertVisible: "(?s).*Transcript copied as Markdown.*"

# Exercise session discovery and the empty-search state.
- tapOn: "(?s).*More actions.*"
- tapOn: "(?s).*Sessions.*"
- assertVisible: "(?s).*Hermes sessions.*"
- assertVisible: "(?s).*Search sessions.*"
- tapOn: "(?s).*Search sessions.*"
- inputText: "qa_no_matching_session_98765"
- assertVisible: "(?s).*No Hermes sessions match.*"
- takeScreenshot: 04_session_search_empty
- hideKeyboard
- pressKey: back

# Verify navigation does not lose the completed live turn.
- tapOn: "(?s).*All chats.*"
- assertVisible: "(?s).*Default agent.*"
- assertVisible: "(?s).*Settings.*"
- tapOn: "(?s).*Default agent.*"
- assertNotVisible: "(?s).*Settings.*"
- assertVisible: "(?s)^white.*"
- takeScreenshot: 05_reopened_chat_retains_turn
- tapOn: "(?s).*All chats.*"
- assertVisible: "(?s).*Default agent.*"
- assertVisible: "(?s).*Settings.*"
