# Automated Needle spike evaluation (Task 9). Run: maestro test scripts/spike/maestro_eval.yaml
# Requires: NEEDLE_SPIKE=true release build installed, model downloadable, phone untouched.
appId: com.trebuchetdynamics.navivox
---
- launchApp:
    stopApp: true
- extendedWaitUntil:
    visible: "Settings\nTab 2 of 2"
    timeout: 60000
- tapOn: "Settings\nTab 2 of 2"
- scrollUntilVisible:
    element: "(?s).*Open Needle evaluation screen.*"
    direction: DOWN
    timeout: 30000
- tapOn: "(?s).*Open Needle evaluation screen.*"
- extendedWaitUntil:
    visible: "(?s).*Run Needle.*"
    timeout: 30000
# ---- chip 01: open the settings screen
- swipe: {direction: DOWN, duration: 200}
- swipe: {direction: DOWN, duration: 200}
- swipe: {direction: DOWN, duration: 200}
- scrollUntilVisible:
    element: "open the settings screen"
    direction: DOWN
    timeout: 30000
    speed: 70
- tapOn: "open the settings screen"
- scrollUntilVisible:
    element: "(?s).*wall \\d+ ms.*"
    direction: DOWN
    timeout: 240000
    speed: 70
    waitToSettleTimeoutMs: 300
- takeScreenshot: needle_shots/needle_01
