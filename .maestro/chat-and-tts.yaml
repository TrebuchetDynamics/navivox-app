appId: com.trebuchetdynamics.hermes.wing
name: Chat and TTS smoke test
tags:
  - device
  - chat
  - tts
---
- launchApp:
    clearState: false
    stopApp: true

- tapOn: Settings.*
- assertVisible: Voice
- runFlow:
    when:
      visible:
        text: Speak replies aloud.*
        checked: false
    commands:
      - tapOn: Speak replies aloud.*
- assertVisible:
    text: Speak replies aloud.*
    checked: true

- tapOn: Hermes.*
- runFlow:
    when:
      visible: Default agent.*
    commands:
      - tapOn: Default agent.*
- extendedWaitUntil:
    visible: Message Hermes.*
    timeout: 15000
- tapOn: Message Hermes.*
- inputText: "Reply in uppercase with these words: maestro chat and speech verified. Then explain the test in two sentences."
- hideKeyboard
- tapOn: Send

- extendedWaitUntil:
    visible: MAESTRO CHAT AND SPEECH VERIFIED.*
    timeout: 60000
- extendedWaitUntil:
    visible: Stop speaking.*
    timeout: 60000
- extendedWaitUntil:
    notVisible: Stop speaking.*
    timeout: 120000
- assertNotVisible: Could not speak Hermes reply.*
