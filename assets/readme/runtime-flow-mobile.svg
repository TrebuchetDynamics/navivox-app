<svg xmlns="http://www.w3.org/2000/svg" width="600" height="760" viewBox="0 0 600 760" role="img" aria-labelledby="title desc">
  <title id="title">Navivox Hermes runtime flow for mobile</title>
  <desc id="desc">A vertical five-stage flow from device speech or typing through operator-reviewed text, a Hermes session, streamed run events, and approval or stop controls.</desc>

  <rect width="600" height="760" rx="28" fill="#111214"/>
  <text x="38" y="36" dominant-baseline="hanging" fill="#f4f4f5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="750">Input to controlled execution</text>
  <text x="40" y="88" dominant-baseline="hanging" fill="#8f96a3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="1">DEVICE → REVIEW → HERMES AUTHORITY</text>

  <path d="M86 174V625" stroke="#30343b" stroke-width="4" stroke-linecap="round"/>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g transform="translate(40 138)">
      <circle cx="46" cy="46" r="40" fill="#1b1d21" stroke="#565b65"/>
      <path d="M35 28v23a11 11 0 0 0 22 0V28M27 48a19 19 0 0 0 38 0M46 67v11M35 78h22" fill="none" stroke="#7dd3fc" stroke-width="3.5" stroke-linecap="round"/>
      <text x="118" y="21" dominant-baseline="hanging" fill="#f4f4f5" font-size="23" font-weight="700">Speak or type</text>
      <text x="118" y="56" dominant-baseline="hanging" fill="#8f96a3" font-size="17">device input</text>
    </g>

    <g transform="translate(40 250)">
      <circle cx="46" cy="46" r="40" fill="#1b1d21" stroke="#565b65"/>
      <rect x="23" y="28" width="46" height="36" rx="7" fill="none" stroke="#7dd3fc" stroke-width="3"/>
      <path d="M31 39h30M31 49h23" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round"/>
      <text x="118" y="21" dominant-baseline="hanging" fill="#f4f4f5" font-size="23" font-weight="700">Review text</text>
      <text x="118" y="56" dominant-baseline="hanging" fill="#8f96a3" font-size="17">before sending</text>
    </g>

    <g transform="translate(40 362)">
      <circle cx="46" cy="46" r="40" fill="#1b1d21" stroke="#3b82f6" stroke-width="2"/>
      <path d="M25 31h42v30H42L30 71V61h-5z" fill="none" stroke="#7dd3fc" stroke-width="3" stroke-linejoin="round"/>
      <text x="118" y="21" dominant-baseline="hanging" fill="#f4f4f5" font-size="23" font-weight="700">Hermes session</text>
      <text x="118" y="56" dominant-baseline="hanging" fill="#8f96a3" font-size="17">durable conversation context</text>
    </g>

    <g transform="translate(40 474)">
      <circle cx="46" cy="46" r="40" fill="#1b1d21" stroke="#3b82f6" stroke-width="2"/>
      <path d="M21 54h10l8-21 12 37 9-23h12" fill="none" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="118" y="21" dominant-baseline="hanging" fill="#f4f4f5" font-size="23" font-weight="700">Stream run</text>
      <text x="118" y="56" dominant-baseline="hanging" fill="#8f96a3" font-size="17">typed events and tool activity</text>
    </g>

    <g transform="translate(40 586)">
      <circle cx="46" cy="46" r="40" fill="#1b1d21" stroke="#3b82f6" stroke-width="2"/>
      <path d="M25 47l13 13 29-31" fill="none" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="118" y="21" dominant-baseline="hanging" fill="#f4f4f5" font-size="23" font-weight="700">Approve or stop</text>
      <text x="118" y="56" dominant-baseline="hanging" fill="#8f96a3" font-size="17">operator control remains visible</text>
    </g>
  </g>

  <g fill="#3b82f6">
    <path d="M86 242l-8-13h16z"/>
    <path d="M86 354l-8-13h16z"/>
    <path d="M86 466l-8-13h16z"/>
    <path d="M86 578l-8-13h16z"/>
  </g>

  <text x="40" y="712" dominant-baseline="hanging" fill="#8f96a3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">Voice submits recognized text—not captured audio.</text>
</svg>
