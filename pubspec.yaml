name: wing
description: An independent cross-platform Flutter client for Hermes Agent sessions, streamed runs, approvals, profiles, and device speech.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  uuid: ^4.6.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.3.1
  web: ^1.1.1
  speech_to_text: ^7.4.0
  flutter_tts: ^4.2.5
  audioplayers: ^6.5.1
  path_provider: ^2.1.5
  crypto: ^3.0.7
  ffi: ^2.1.4
  archive: ^4.0.2
  pocket_speech:
    git:
      url: https://github.com/TrebuchetDynamics/pocket-speech-dart.git
      ref: 17f45643e65a834b6852f433e2b4b2c0a6630597
  flutter_markdown_plus: ^1.0.12
  url_launcher: ^6.3.2
  markdown: ^7.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - hermes-wing-icon.png
